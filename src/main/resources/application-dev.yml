spring:
  datasource:
    url: jdbc:h2:mem:achadosdb
    password:
    username: sa
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console


  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

api:
  security:
    token:
      secret: ${JWT_SECRET:dev-secret}}

jwt:
  expiration:
    hours: 24